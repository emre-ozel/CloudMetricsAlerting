name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run data pipeline (download + preprocess)
        run: |
          python -m src.data_loader
          python -m src.preprocess

      - name: Train models (default, no tuning)
        run: python -m src.model

      - name: Evaluate models and verify new metrics
        run: |
          OUTPUT=$(python -m src.evaluate 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "False Positive Rate"
          echo "$OUTPUT" | grep -q "False Alarm Rate"
          echo "$OUTPUT" | grep -q "Avg Precision"

      - name: Smoke-test Optuna tuning (5 trials)
        run: python -m src.model --model xgb --tune --trials 5
